name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Unzip Project
        run: unzip AntiqueChessMaster_Project.zip

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant permission
        run: chmod +x ./gradlew
        working-directory: AntiqueChessMaster

      - name: Build APK
        run: ./gradlew assembleDebug
        working-directory: AntiqueChessMaster

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: AntiqueChessMaster/app/build/outputs/apk/debug/app-debug.apk